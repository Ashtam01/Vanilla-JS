<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body>
    <!-- Wrapper -->
     <Wrapper class="w-[100vw] h-[100vh] flex flex-col items-center justify-center bg-[#344151] gap-10">
        <main>
            <div class="text-[#0398d4] font-medium text-[20px]">Increment and Decrement</div>
            <div class="bg-white flex text-[25px] text-[#344151] rounded-sm gap-12 p-3 px-5">
                <button class=" minus border-r-2 border-[#bfbfbf] pr-5">
                <i data-lucide="minus"></i>

                </button>
                <div class=" number font-bold">
                    0
                </div>

                <button class="plus border-l-2 border-[#bfbfbf] pl-5">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </main>
     </Wrapper>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons()</script>
    <script src = './1.js'></script>
</body>
</html>
